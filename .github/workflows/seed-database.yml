# Заполнение продовой БД тестовыми данными (тот же prisma/seed.ts, что локально).
# Секрет PRODUCTION_DATABASE_URL — та же строка, что DATABASE_URL в Vercel.
#
# GitHub → Actions → «Seed database» → Run workflow

name: Seed database

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Run seed
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: npx prisma db seed
